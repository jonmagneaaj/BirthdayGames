<!DOCTYPE html>
<html lang="en" data-color-scheme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Games — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@digdir/designsystemet-css@1.12.1/dist/theme/designsystemet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@digdir/designsystemet-css@1.12.1/dist/src/index.css" />
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/leaderboard.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div id="app">

  <header id="header">
    <div>
      <h1 class="gradient-text">🎂 Birthday Games</h1>
      <div class="tagline">Live Leaderboards</div>
    </div>
    <div id="qr-section">
      <div id="qr-code"></div>
      <div id="qr-label">Loading…</div>
    </div>
  </header>

  <div id="panels">
    <section class="board-panel board-quiz">
      <div class="board-panel-header">
        <div>
          <div class="board-panel-title">🧠 Quiz Scores</div>
          <div class="board-panel-subtitle">Speed &amp; accuracy</div>
        </div>
        <div id="quiz-count" class="player-count">—</div>
      </div>
      <div id="quiz-list" class="board-list">
        <div class="board-empty"><div class="empty-icon">⏳</div><p>Connecting…</p></div>
      </div>
      <div id="last-updated">
        <span class="live-dot"></span>Live · <span id="last-updated-time">—</span>
      </div>
    </section>

    <section class="board-panel board-live">
      <div class="board-panel-header">
        <div>
          <div class="board-panel-title">🎮 Live Games</div>
          <div class="board-panel-subtitle">Updated by the host</div>
        </div>
        <div id="live-count" class="player-count">—</div>
      </div>
      <div id="live-list" class="board-list">
        <div class="board-empty"><div class="empty-icon">⏳</div><p>Connecting…</p></div>
      </div>
    </section>
  </div>

  <!-- ===== TEAM MODE SCREEN ===== -->
  <div id="screen-teams" class="hidden">
    <div id="teams-header">
      <span id="teams-title" class="gradient-text">🏆 Lagspill!</span>
      <div id="teams-subtitle">Finn laget ditt</div>
    </div>
    <div id="team-grid"></div>
  </div>

</div>

<script type="module" src="js/leaderboard.js"></script>
</body>
</html>
