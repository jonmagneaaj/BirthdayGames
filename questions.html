<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Games — Question Editor</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/questions.css" />
</head>
<body>

<div id="app">

  <!-- ===== AUTH SCREEN ===== -->
  <section id="screen-auth">
    <div class="auth-hero">
      <span class="emoji">✏️</span>
      <h1>Question Editor</h1>
      <p>Enter the admin password to manage quiz questions.</p>
    </div>
    <div class="auth-form">
      <label for="auth-password">Password</label>
      <input type="password" id="auth-password" placeholder="Enter password" autocomplete="current-password" />
      <button id="btn-auth-login">Login</button>
      <div id="auth-error"></div>
    </div>
  </section>

  <!-- ===== MAIN SCREEN ===== -->
  <section id="screen-main">

    <div class="page-header">
      <div>
        <h1>✏️ Question Editor</h1>
        <div class="subtitle">Questions are saved to Firestore and used live in the quiz</div>
      </div>
      <a href="admin.html" class="back-link">← Admin panel</a>
    </div>

    <!-- ===== INSPIRATION PANEL ===== -->
    <div class="section-card" id="inspiration-panel">
      <div class="section-title">💡 Question Inspiration</div>
      <div class="inspiration-content">
        <div id="inspiration-icon" class="inspiration-icon">🎂</div>
        <div class="inspiration-body">
          <div id="inspiration-category" class="inspiration-category">Category</div>
          <div id="inspiration-text">Loading inspiration…</div>
          <div id="inspiration-hint"></div>
          <button id="btn-refresh-inspiration">
            <span class="refresh-icon">↻</span> New idea
          </button>
        </div>
      </div>
    </div>

    <!-- ===== ADD QUESTION FORM ===== -->
    <div class="section-card">
      <div class="section-title">➕ Add a Question</div>

      <div class="form-group">
        <label class="form-label" for="question-input">Question</label>
        <textarea
          id="question-input"
          class="form-textarea"
          placeholder="e.g. What city was Jon born in?"
          rows="2"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Number of answers</label>
        <div class="answer-count-btns">
          <button class="count-btn" data-count="2">2</button>
          <button class="count-btn" data-count="3">3</button>
          <button class="count-btn active" data-count="4">4</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Answers <span style="font-weight:400;text-transform:none;letter-spacing:0">— tap the circle to mark the correct one</span></label>
        <p class="correct-hint">Green circle = correct answer</p>
        <div id="answers-form"></div>
      </div>

      <button id="btn-add-question">+ Add Question</button>
      <div id="form-status" class="form-status"></div>
    </div>

    <!-- ===== EXISTING QUESTIONS ===== -->
    <div class="section-card">
      <div class="questions-header">
        <div class="section-title">📋 All Questions</div>
        <span id="question-count-badge">—</span>
      </div>
      <div id="questions-list">
        <div class="list-loading">Loading…</div>
      </div>
    </div>

  </section>

</div>

<script type="module" src="js/questions.js"></script>
</body>
</html>
