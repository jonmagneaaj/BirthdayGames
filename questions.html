<!DOCTYPE html>
<html lang="no" data-color-scheme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Games — Spørsmålsredaktør</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@digdir/designsystemet-css@1.12.1/dist/theme/designsystemet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@digdir/designsystemet-css@1.12.1/dist/src/index.css" />
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/questions.css" />
</head>
<body>

<div id="app">

  <!-- ===== AUTH ===== -->
  <section id="screen-auth">
    <div class="auth-hero">
      <span class="auth-emoji">✏️</span>
      <h1>Spørsmålsredaktør</h1>
      <p>Skriv inn adminpassordet for å administrere quizspørsmål.</p>
    </div>
    <div class="auth-form">
      <div class="ds-field">
        <label class="ds-label" for="auth-password">Passord</label>
        <input class="ds-input" type="password" id="auth-password" placeholder="Skriv inn passord" autocomplete="current-password" />
      </div>
      <button id="btn-auth-login" class="ds-button" data-fullwidth>Logg inn</button>
      <div id="auth-error" class="auth-error-msg"></div>
    </div>
  </section>

  <!-- ===== MAIN ===== -->
  <section id="screen-main">

    <div class="page-header">
      <div>
        <h1>✏️ Spørsmålsredaktør</h1>
        <div class="subtitle">Spørsmål lagres i Firestore og brukes live i quizen</div>
      </div>
      <a href="admin.html" class="ds-button" data-variant="secondary">← Admin</a>
    </div>

    <!-- INSPIRATION -->
    <div class="section-card inspiration-card">
      <div class="section-title">💡 Inspirasjon til spørsmål</div>
      <div class="inspiration-content">
        <div id="inspiration-icon" class="inspiration-icon">🎂</div>
        <div class="inspiration-body">
          <div id="inspiration-category" class="inspiration-category">Kategori</div>
          <div id="inspiration-text" class="inspiration-text">Laster inspirasjon…</div>
          <div id="inspiration-hint" class="inspiration-hint"></div>
          <button id="btn-refresh-inspiration" class="ds-button" data-variant="secondary" data-size="sm">
            <span class="refresh-icon">↻</span> Ny idé
          </button>
        </div>
      </div>
    </div>

    <!-- ADD QUESTION -->
    <div class="section-card">
      <div class="section-title">➕ Legg til et spørsmål</div>

      <div class="ds-field">
        <label class="ds-label" for="question-input">Spørsmål</label>
        <textarea
          class="ds-input"
          id="question-input"
          placeholder="f.eks. Hvilken by er Jon fra?"
          rows="2"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="ds-label">Antall svar</label>
        <div class="answer-count-btns">
          <button class="count-btn ds-button" data-variant="secondary" data-size="sm" data-count="2">2</button>
          <button class="count-btn ds-button" data-variant="secondary" data-size="sm" data-count="3">3</button>
          <button class="count-btn ds-button active" data-variant="secondary" data-size="sm" data-count="4">4</button>
        </div>
      </div>

      <div class="form-group">
        <label class="ds-label">Svar <span class="label-note">— trykk på sirkelen for å markere riktig svar</span></label>
        <p class="correct-hint">Grønn sirkel = riktig svar</p>
        <div id="answers-form"></div>
      </div>

      <button id="btn-add-question" class="ds-button" data-fullwidth>+ Legg til spørsmål</button>
      <div id="form-status" class="form-status"></div>
    </div>

    <!-- QUESTION LIST -->
    <div class="section-card">
      <div class="questions-header">
        <div class="section-title">📋 Alle spørsmål</div>
        <span id="question-count-badge" class="count-badge">—</span>
      </div>
      <div id="questions-list"><div class="list-loading">Laster…</div></div>
    </div>

  </section>

</div>

<script type="module" src="js/questions.js"></script>
</body>
</html>
